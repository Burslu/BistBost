name: BIST Bot Runner

on:
  schedule:
    - cron: '*/10 7-15 * * 1-5'  # UTC 07:00-15:00 = TR 10:00-18:00
  workflow_dispatch:

jobs:
  run_bot:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Bagimliliklar
        run: pip install -r requirements.txt

      - name: Tek sefer analiz
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python bist100_signal_bot.py --tek
